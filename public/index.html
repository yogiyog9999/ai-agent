<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Debugger</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; }
        #transcript { margin: 20px auto; width: 80%; padding: 20px; background: #2a2a2a; border-radius: 8px; min-height: 100px; border: 1px solid #444; color: #00ff00; }
        #v-meter { width: 200px; height: 20px; background: #333; margin: 10px auto; border-radius: 10px; overflow: hidden; }
        #v-level { width: 0%; height: 100%; background: #00ff00; transition: width 0.1s; }
        button { padding: 15px 40px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎤 Voice Agent Debugger</h1>
    <div id="v-meter"><div id="v-level"></div></div>
    <div id="status">Ready</div>
    <div id="transcript">Transcripts will appear here...</div>
    <button id="startBtn">Start Debugging</button>

    <script>
        let ws, mediaRecorder, audioCtx, analyser, dataArray;
        const startBtn = document.getElementById('startBtn');

        async function start() {
            console.log("Starting debug session...");
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // --- VOLUME METER LOGIC ---
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function updateMeter() {
                analyser.getByteFrequencyData(dataArray);
                const average = dataArray.reduce((a, b) => a + b) / dataArray.length;
                document.getElementById('v-level').style.width = Math.min(average * 2, 100) + '%';
                requestAnimationFrame(updateMeter);
            }
            updateMeter();
            // --------------------------

            ws = new WebSocket(`wss://${window.location.host}`);
            
            ws.onopen = () => {
                document.getElementById('status').textContent = "CONNECTED TO SERVER";
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                mediaRecorder.ondataavailable = (e) => {
                    if (ws.readyState === WebSocket.OPEN) ws.send(e.data);
                };
                mediaRecorder.start(250);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'text') {
                    document.getElementById('transcript').innerText = msg.delta;
                    // Speak back
                    const utter = new SpeechSynthesisUtterance(msg.delta);
                    window.speechSynthesis.speak(utter);
                }
            };
        }

        startBtn.onclick = start;
    </script>
</body>
</html>
