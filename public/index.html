<!DOCTYPE html>
<html>
<head>
    <title>AI Marketing Voice Agent</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        #transcript { margin: 20px auto; width: 80%; padding: 20px; background: white; border-radius: 8px; min-height: 150px; border: 1px solid #ddd; overflow-y: auto; }
        button { padding: 15px 40px; font-size: 1.2rem; background: #007bff; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        #status { font-weight: bold; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🤖 AI Marketing Agent</h1>
    <div id="transcript">Waiting for speech...</div>
    <div id="status">Ready</div>
    <br>
    <button id="startBtn">🎤 Start Listening</button>

    <script>
        let ws, mediaRecorder, stream;
        const startBtn = document.getElementById('startBtn');
        const transcriptDiv = document.getElementById('transcript');
        const statusDiv = document.getElementById('status');

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        async function init() {
            startBtn.disabled = true;
            statusDiv.textContent = 'Opening Mic...';

            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { sampleRate: 48000, echoCancellation: true } 
                });

                ws = new WebSocket(`wss://${window.location.host}`);
                
                ws.onopen = () => {
                    statusDiv.textContent = '🎤 Connected! Speak now...';
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (ws.readyState === WebSocket.OPEN && e.data.size > 0) ws.send(e.data);
                    };
                    
                    mediaRecorder.start(250); 
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'text') {
                        transcriptDiv.textContent = msg.delta;
                        // Trigger voice response on sentence end
                        if (msg.delta.endsWith('.') || msg.delta.endsWith('?')) {
                            speakText(msg.delta);
                        }
                    }
                };

                ws.onclose = () => {
                    statusDiv.textContent = 'Disconnected. Click to retry.';
                    startBtn.disabled = false;
                };

            } catch (err) {
                statusDiv.textContent = 'Error: ' + err.message;
                startBtn.disabled = false;
            }
        }

        startBtn.onclick = init;
    </script>
</body>
</html>
