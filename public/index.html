<!DOCTYPE html>
<html>
<body>
  <button id="start">🎤 Start Session</button>
  <div id="output" style="white-space: pre-wrap; font-family: monospace; padding: 20px;"></div>

  <script>
    let audioContext;
    let ws;

    document.getElementById('start').onclick = async () => {
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
      await audioContext.resume();
      
      ws = new WebSocket(`ws://${location.host}`);
      ws.binaryType = 'arraybuffer';

      // 1. MIC INPUT
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) ws.send(e.data);
      };
      mediaRecorder.start(250);

      // 2. AUDIO OUTPUT (RECEIVE FROM SERVER)
      ws.onmessage = async (event) => {
        if (event.data instanceof ArrayBuffer) {
          // Play binary audio
          playOutput(event.data);
        } else {
          // Handle text UI
          const data = JSON.parse(event.data);
          document.getElementById('output').innerText += data.delta + '\n';
        }
      };
    };

    async function playOutput(arrayBuffer) {
      try {
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioContext.destination);
        source.start();
      } catch (e) {
        console.error("Audio Playback Error", e);
      }
    }
  </script>
</body>
</html>
